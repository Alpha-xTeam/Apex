<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="lock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Shield outline -->
  <path
    d="M32 6 L54 16 L54 36 Q54 50 32 58 Q10 50 10 36 L10 16 Z"
    stroke="#10b981"
    stroke-width="2.2"
    fill="none"
  />

  <!-- Lock body -->
  <rect x="22" y="32" width="20" height="16" rx="2.5" fill="url(#lock)"/>

  <!-- Lock shackle -->
  <path
    d="M26 32 V26 a6 6 0 0 1 12 0 V32"
    stroke="#10b981"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Keyhole -->
  <circle cx="32" cy="39" r="1.8" fill="#0a0a0a"/>
  <rect x="31.2" y="39" width="1.6" height="5" rx="0.5" fill="#0a0a0a"/>
</svg>
